<style>
:root{
  --canvas:#F7F7F5;
  --carbon:#141415;
  --indigo:#0047FF;
  --flint:#8E8E8B;
  --hair:rgba(20,20,21,.14);
  --hair-soft:rgba(20,20,21,.08);
  --paper:#FFFFFF;
  --indigo-wash:rgba(0,71,255,.06);
  --amber:#B45309;
  --amber-wash:rgba(180,83,9,.07);
  --green:#1a7f52;
  --green-wash:rgba(26,127,82,.07);
  --sans:'Inter',-apple-system,sans-serif;
  --display:'Inter Tight',-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:var(--canvas);
  color:var(--carbon);
  line-height:1.6;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
}
/* ---------- Layout ---------- */
.shell{display:flex;min-height:100vh}
.sidebar{
  width:290px;flex-shrink:0;
  background:var(--paper);
  border-right:.5px solid var(--hair);
  height:100vh;position:sticky;top:0;
  overflow-y:auto;
  padding:0;
}
.main{flex:1;min-width:0;padding:0}
.wrap{max-width:820px;margin:0 auto;padding:56px 48px 120px}
/* ---------- Sidebar ---------- */
.brand{padding:26px 24px 20px;border-bottom:.5px solid var(--hair)}
.brand .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--flint)}
.brand h1{font-family:var(--display);font-size:19px;font-weight:600;letter-spacing:-.03em;margin-top:6px;line-height:1.15}
.progress-wrap{padding:16px 24px;border-bottom:.5px solid var(--hair)}
.progress-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--flint);margin-bottom:8px}
.progress-bar{height:3px;background:var(--hair-soft);position:relative;overflow:hidden}
.progress-fill{position:absolute;top:0;left:0;height:100%;background:var(--indigo);width:0;transition:width .4s ease}
.nav{padding:12px 0 40px}
.nav-group{margin-bottom:2px}
.nav-domain{
  display:flex;align-items:baseline;gap:8px;
  padding:11px 24px 6px;
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--flint);
}
.nav-domain .wt{margin-left:auto;color:var(--indigo);font-weight:500}
.nav-link{
  display:block;padding:7px 24px 7px 24px;
  font-size:13px;color:var(--carbon);text-decoration:none;cursor:pointer;
  border-left:2px solid transparent;line-height:1.35;
  transition:background .12s,border-color .12s;
}
.nav-link:hover{background:var(--indigo-wash)}
.nav-link.active{border-left-color:var(--indigo);background:var(--indigo-wash);font-weight:500}
.nav-link .done{color:var(--indigo);font-weight:600}
.nav-section-title{padding:16px 24px 4px;font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--flint);border-top:.5px solid var(--hair-soft);margin-top:10px}
.nav-link.cheat{color:var(--carbon)}
.nav-link.cheat::before{content:"▸ ";color:var(--indigo)}
/* ---------- Content typography ---------- */
.view{display:none}
.view.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--flint);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.eyebrow .num{color:var(--indigo)}
.eyebrow .wt-badge{margin-left:auto;padding:2px 8px;border:.5px solid var(--hair);color:var(--carbon);letter-spacing:.08em}
h2.title{font-family:var(--display);font-size:30px;font-weight:600;letter-spacing:-.04em;line-height:1.12;margin-bottom:8px}
.lead{font-size:16px;color:#3a3a3c;margin-bottom:8px;max-width:64ch}
.rule{height:.5px;background:var(--hair);margin:28px 0}
h3{font-family:var(--display);font-size:19px;font-weight:600;letter-spacing:-.02em;margin:30px 0 10px}
h4{font-family:var(--display);font-size:15px;font-weight:600;letter-spacing:-.01em;margin:22px 0 6px}
p{margin-bottom:12px;max-width:68ch}
.view p, .view li{color:#25252a}
ul,ol{margin:0 0 14px 22px}
li{margin-bottom:5px;max-width:66ch}
strong{font-weight:600;color:var(--carbon)}
code{font-family:var(--mono);font-size:12.5px;background:var(--indigo-wash);color:var(--carbon);padding:1px 5px;border-radius:2px}
a.tlink{color:var(--indigo);text-decoration:none;border-bottom:.5px solid rgba(0,71,255,.3)}
a.tlink:hover{border-bottom-color:var(--indigo)}
/* ---------- Callouts ---------- */
.box{border:.5px solid var(--hair);padding:16px 18px;margin:18px 0;background:var(--paper)}
.box .box-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.box.trap{background:var(--amber-wash);border-color:rgba(180,83,9,.25)}
.box.trap .box-label{color:var(--amber)}
.box.key{background:var(--indigo-wash);border-color:rgba(0,71,255,.22)}
.box.key .box-label{color:var(--indigo)}
.box.mnem{background:var(--green-wash);border-color:rgba(26,127,82,.25)}
.box.mnem .box-label{color:var(--green)}
.box p:last-child,.box ul:last-child,.box li:last-child{margin-bottom:0}
/* ---------- Tables ---------- */
.tbl-scroll{overflow-x:auto;margin:18px 0}
table{border-collapse:collapse;width:100%;font-size:13px;background:var(--paper);border:.5px solid var(--hair)}
th{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--flint);text-align:left;padding:10px 12px;border-bottom:.5px solid var(--hair);background:var(--canvas);vertical-align:top}
td{padding:10px 12px;border-bottom:.5px solid var(--hair-soft);vertical-align:top;color:#25252a}
tr:last-child td{border-bottom:none}
td strong{color:var(--carbon)}

.mark-btn{

.mark-btn.done{background:var(--indigo);border-color:var(--indigo);color:#fff}

.nav-jump button:hover{border-color:var(--carbon)}
.nav-jump button:disabled{opacity:.3;cursor:default}

.cheat-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:6px}
.cheat-head .title{flex:1}
.print-btn{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;border:.5px solid var(--carbon);background:transparent;cursor:pointer;white-space:nowrap}
.print-btn:hover{background:var(--carbon);color:var(--canvas)}
.cheat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
.cheat-card{border:.5px solid var(--hair);background:var(--paper);padding:14px 16px}

.cheat-card ul{margin:0 0 0 16px;font-size:12.5px}
.cheat-card li{margin-bottom:4px;line-height:1.45}
.cheat-card.full{grid-column:1/-1}
.kv{font-size:12.5px;line-height:1.5}
.kv b{color:var(--carbon)}

.fact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5px;background:var(--hair);border:.5px solid var(--hair);margin:24px 0}
.fact{background:var(--paper);padding:18px 20px}
.fact .n{font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:-.03em}
.fact .n .u{font-size:14px;color:var(--flint);font-weight:400}
.fact .l{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--flint);margin-top:4px}
.weight-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:.5px solid var(--hair-soft);cursor:pointer}
.weight-row:hover .wname{color:var(--indigo)}
.weight-row:last-child{border-bottom:none}
.weight-row .wnum{font-family:var(--mono);font-size:11px;color:var(--flint);width:22px}
.weight-row .wname{font-family:var(--display);font-weight:500;font-size:15px;flex:1;letter-spacing:-.01em}
.weight-row .wbar{width:180px;height:6px;background:var(--hair-soft);position:relative;flex-shrink:0}
.weight-row .wbar span{position:absolute;left:0;top:0;height:100%;background:var(--indigo)}
.weight-row .wpct{font-family:var(--mono);font-size:12px;width:38px;text-align:right;font-weight:500}
/* ---------- Mobile ---------- */
.menu-toggle{display:none}
.topbar{display:none}
@media(max-width:960px){
  .sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:transform .25s;box-shadow:0 0 0 100vmax rgba(0,0,0,0);width:280px}
  .sidebar.open{transform:translateX(0);box-shadow:0 0 0 100vmax rgba(0,0,0,.35)}
  .topbar{display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:.5px solid var(--hair);padding:12px 18px}
  .menu-toggle{display:inline-flex;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:4px}

  .topbar .tt{font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:-.02em}
  .wrap{padding:32px 22px 100px}
  .cheat-grid,.fact-grid{grid-template-columns:1fr}
  .weight-row .wbar{width:90px}
  h2.title{font-size:24px}
}
/* ---------- Print ---------- */
@media print{
  .sidebar,.topbar,.lesson-foot,.print-btn,.mark-btn,.nav-jump{display:none!important}
  .view{display:none!important}
  .view.printing{display:block!important}

  .wrap{max-width:100%;padding:0}
  .cheat-grid{gap:8px}
  .cheat-card{break-inside:avoid;border:.5px solid #999}
  .box{break-inside:avoid}
  table{font-size:10px}
  h2.title{font-size:20px}
  @page{margin:1.2cm}
}

DATA.overview = `
<div class="eyebrow"><span class="num">00</span> · Orientation</div>
<h2 class="title">The exam, and how to beat it.</h2>
<p class="lead">The Platform App Builder credential proves you can design, build, and deploy custom applications using the <strong>declarative</strong> (point-and-click) capabilities of the Salesforce Platform — data model, security, business logic, UI, and deployment — and that you know exactly where declarative ends and code begins.</p>
<div class="fact-grid">
  <div class="fact"><div class="n">60<span class="u"> +5</span></div><div class="l">Scored questions (+5 unscored)</div></div>
  <div class="fact"><div class="n">105<span class="u"> min</span></div><div class="l">Time limit</div></div>
  <div class="fact"><div class="n">63<span class="u">%</span></div><div class="l">Passing score (~38/60)</div></div>
  <div class="fact"><div class="n">USD 200</div><div class="l">Register · USD 100 retake</div></div>
</div>
<p>Multiple-choice and multiple-select. Proctored, onsite or online. No prerequisites, though Salesforce recommends 6–12 months building apps on the platform. Almost every question is <strong>scenario-based</strong>: you are given business requirements and asked for the <em>most appropriate</em> solution — rarely a straight definition.</p>
<div class="box key"><div class="box-label">◆ The governing principle</div><p>When two solutions both "work", the exam nearly always rewards the <strong>lowest-code, most maintainable, most scalable</strong> one. Declarative beats code unless a requirement is impossible declaratively. Standard beats custom. Configuration beats customisation.</p></div>

<h3>The five domains, by weight</h3>
<p>Study time should follow the weighting. Business Logic and Fundamentals together are over half the exam.</p>
<div class="weights">
  <div class="weight-row" onclick="show('blpa_formula')"><span class="wnum">03</span><span class="wname">Business Logic &amp; Process Automation</span><span class="wbar"><span style="width:100%"></span></span><span class="wpct">28%</span></div>
  <div class="weight-row" onclick="show('fund_declarative')"><span class="wnum">01</span><span class="wname">Salesforce Fundamentals</span><span class="wbar"><span style="width:82%"></span></span><span class="wpct">23%</span></div>
  <div class="weight-row" onclick="show('data_model')"><span class="wnum">02</span><span class="wname">Data Modeling &amp; Management</span><span class="wbar"><span style="width:78%"></span></span><span class="wpct">22%</span></div>
  <div class="weight-row" onclick="show('ui_customization')"><span class="wnum">04</span><span class="wname">User Interface</span><span class="wbar"><span style="width:60%"></span></span><span class="wpct">17%</span></div>
  <div class="weight-row" onclick="show('deploy_lifecycle')"><span class="wnum">05</span><span class="wname">App Deployment</span><span class="wbar"><span style="width:36%"></span></span><span class="wpct">10%</span></div>
</div>

<h3>How to use this guide</h3>
<p>Each objective is a lesson with a deep dive, exam traps, and mnemonics. Mark lessons complete to track progress (saved in your browser). Every domain has a one-page <strong>cheat sheet</strong> for revision, plus a <strong>master cheat sheet</strong> across the whole exam — all printable via the print button.</p>
<div class="box mnem"><div class="box-label">◆ Recall aids</div><p>Recurring exam-trap patterns are flagged in amber; the single most important fact in each lesson is flagged in indigo. If you only revise the cheat sheets the week before, you'll cover ~80% of what's asked.</p></div>

<h3>The 48-hour discipline</h3>
<ul>
<li><strong>Order of Execution</strong> — know the save sequence cold; it disambiguates half the automation questions.</li>
<li><strong>Field-type change data loss</strong> — memorise which conversions destroy data.</li>
<li><strong>Relationship types</strong> — master-detail vs lookup vs junction, and their side-effects on sharing, roll-ups, and reporting.</li>
<li><strong>Sandbox types</strong> — data copied and refresh intervals.</li>
<li><strong>Flow beats everything</strong> — new automation is Flow; Workflow Rules and Process Builder are legacy and can no longer be created.</li>
</ul>
`;

/* ================= DOMAIN 1: FUNDAMENTALS ================= */
DATA.domains.push({
  num:'01', short:'Fundamentals', title:'Salesforce Fundamentals', weight:23,
  lessons:[
  {
    id:'fund_declarative', nav:'Declarative vs code boundaries',
    title:'Boundaries of declarative vs programmatic customization',
    lead:'Knowing when point-and-click runs out and code becomes necessary is the single most tested idea on the whole exam.',
    body:`
<h3>The build ladder</h3>
<p>Salesforce customisation climbs a ladder, and you always start at the bottom rung that satisfies the requirement:</p>
<ol>
<li><strong>Configuration</strong> — standard features you switch on (standard objects, standard fields, list views).</li>
<li><strong>Declarative customisation</strong> — custom objects/fields, page layouts, Lightning App Builder, formula fields, validation rules, Flows, approval processes.</li>
<li><strong>Programmatic customisation</strong> — Apex (triggers, classes), Lightning Web Components / Aura, Visualforce, callouts.</li>
</ol>
<div class="box key"><div class="box-label">◆ Core rule</div><p>Choose the <strong>highest-level (least code)</strong> option that fully meets the requirement. Code is only "correct" on this exam when the requirement is <em>impossible</em> declaratively.</p></div>

<h3>When you are forced into code</h3>
<p>Reach for Apex / LWC only when the scenario needs something declarative tools genuinely cannot do:</p>
<ul>
<li><strong>Complex logic across many records / bulk operations</strong> beyond what Flow handles cleanly (heavy loops, complex transaction control, rollback).</li>
<li><strong>Complex validation across unrelated objects</strong> that a validation rule or Flow can't express.</li>
<li><strong>Custom transactional logic</strong> — e.g. enforcing rules that must run before/after DML in ways Flow can't, or complex duplicate/merge logic.</li>
<li><strong>Web service callouts</strong> to external systems (Apex, or Flow with an External Service / HTTP Callout action for simpler cases).</li>
<li><strong>Highly custom UI/UX</strong> that App Builder + standard components can't deliver → Lightning Web Components.</li>
<li><strong>Scheduling and asynchronous processing</strong> beyond scheduled Flows (Batch/Queueable Apex).</li>
</ul>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>If a scenario is achievable with a <strong>Flow, formula, validation rule, or roll-up summary</strong>, then an answer proposing "write an Apex trigger" is <strong>wrong</strong> — even though it would technically work. The reverse trap: a requirement that clearly needs a callout or complex bulk logic where the "use a validation rule" answer is too weak.</p></div>

<h3>Signals in the question</h3>
<div class="tbl-scroll"><table>
<tr><th>Phrase in scenario</th><th>Usually points to</th></tr>
<tr><td>"without using code", "point-and-click", "admin should maintain"</td><td>Declarative (Flow, formula, validation rule)</td></tr>
<tr><td>"prevent saving when…"</td><td>Validation rule</td></tr>
<tr><td>"automatically update / create records when…"</td><td>Record-triggered Flow</td></tr>
<tr><td>"calculate and display a value"</td><td>Formula field (or roll-up)</td></tr>
<tr><td>"call an external system", "complex logic on thousands of records"</td><td>Apex</td></tr>
<tr><td>"pixel-perfect / bespoke interface"</td><td>Lightning Web Component</td></tr>
</table></div>
`
  },
  {
    id:'fund_appexchange', nav:'Extending an org with AppExchange',
    title:'Extending an org using the AppExchange',
    lead:'AppExchange is the "buy, don\'t build" answer — the marketplace of ready-made solutions installed as packages.',
    body:`
<h3>What AppExchange offers</h3>
<p>AppExchange is Salesforce's marketplace. You install pre-built functionality instead of building it yourself. Listings come in several forms:</p>
<ul>
<li><strong>Apps</strong> — complete solutions (a full accounting app, a document-generation app).</li>
<li><strong>Components / Bolt solutions</strong> — Lightning components or building blocks that drop into your org.</li>
<li><strong>Flow / Lightning extensions</strong> — actions and templates.</li>
<li><strong>Consulting partners</strong> — implementation services, not software.</li>
</ul>
<div class="box key"><div class="box-label">◆ Delivery mechanism</div><p>AppExchange solutions install as <strong>managed packages</strong> (usually) — namespaced, upgradeable by the publisher, IP-protected. This links directly to the App Deployment domain.</p></div>

<h3>The "build vs buy" judgement</h3>
<p>Choose AppExchange when the scenario describes a <strong>common, non-differentiating need</strong> that a vendor has already solved: e-signature, mass email, data quality/dedupe, document generation, complex billing. Building it yourself would be slower, costlier, and unmaintained.</p>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>Watch for a requirement that a well-known category of app solves (e.g. "generate a branded PDF quote", "clean and deduplicate imported data"). The best answer is often <strong>"install an app from the AppExchange"</strong> rather than a custom build — the exam rewards not reinventing the wheel.</p></div>
<h4>Before installing</h4>
<ul>
<li>Check <strong>security review</strong> status, editions supported, and Salesforce limits the package consumes (custom objects/fields, tabs).</li>
<li>Install into a <strong>sandbox</strong> first to test.</li>
<li>Choose install scope: admins only, all users, or specific profiles.</li>
</ul>
`
  },
  {
    id:'fund_access', nav:'Object, record & field access',
    title:'Restricting and extending object, record & field access',
    lead:'Salesforce security is layered: object → field → record. You must know which lever controls which layer.',
    body:`
<h3>The three layers of access</h3>
<div class="tbl-scroll"><table>
<tr><th>Layer</th><th>Question it answers</th><th>Controlled by</th></tr>
<tr><td><strong>Object</strong></td><td>Can the user see/create/edit/delete this <em>type</em> of record at all? (CRUD)</td><td>Profiles &amp; Permission Sets</td></tr>
<tr><td><strong>Field</strong></td><td>Can the user see/edit this <em>field</em>? (FLS)</td><td>Profiles &amp; Permission Sets (Field-Level Security)</td></tr>
<tr><td><strong>Record</strong></td><td><em>Which specific records</em> of a type can the user see/edit?</td><td>OWD, Role Hierarchy, Sharing Rules, Manual Sharing, Teams</td></tr>
</table></div>

<h3>Object &amp; field access — Profiles vs Permission Sets</h3>
<ul>
<li>Every user has <strong>exactly one profile</strong> (baseline). A profile grants object CRUD, FLS, tab visibility, app access, and system/user permissions.</li>
<li><strong>Permission sets</strong> (and permission set groups) <strong>grant additional</strong> access on top of the profile. They only add — they never remove.</li>
</ul>
<div class="box key"><div class="box-label">◆ Best-practice model</div><p>Keep profiles <strong>minimal/baseline</strong> and layer exceptions with <strong>permission sets</strong>. When a scenario says "a subset of users also needs X", the answer is a <strong>permission set</strong>, not a new profile.</p></div>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>A permission set can only <strong>extend</strong> access. It cannot take away what the profile grants. To <em>restrict</em>, you tighten the profile (or use permission set groups with a <strong>muting</strong> permission set within a group).</p></div>

<h3>CRUD + FLS interaction</h3>
<p>Field access is only meaningful if object access exists. A user needs <strong>Read on the object AND Visible on the field</strong> to see field data. "Edit" similarly requires both.</p>
<h4>Extending vs restricting — the levers</h4>
<ul>
<li><strong>Extend object/field access:</strong> permission sets / permission set groups.</li>

    lead:'Model with the objects and record types the platform already gives you; add custom only where the standard model has no home for the data.',
    body:`
<h3>Standard objects first</h3>
<p>Know the core CRM objects and how they relate before inventing custom ones:</p>
<div class="tbl-scroll"><table>
<tr><th>Object</th><th>Represents</th><th>Key relationships</th></tr>
<tr><td><strong>Account</strong></td><td>A company/organisation (or person, in Person Accounts)</td><td>Parent to Contacts, Opportunities, Cases</td></tr>
<tr><td><strong>Contact</strong></td><td>An individual, usually linked to an Account</td><td>Child of Account; Contact Roles on Opps/Cases</td></tr>
<tr><td><strong>Lead</strong></td><td>An unqualified prospect (person + company in one)</td><td>Converts to Account + Contact + Opportunity</td></tr>
<tr><td><strong>Opportunity</strong></td><td>A potential sale/deal</td><td>Child of Account; has Products (line items), Stages</td></tr>
<tr><td><strong>Case</strong></td><td>A customer service issue</td><td>Child of Account/Contact</td></tr>
<tr><td><strong>Campaign</strong></td><td>A marketing initiative</td><td>Many-to-many with Leads/Contacts via Campaign Members</td></tr>
</table></div>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p><strong>Lead conversion</strong> creates an Account, a Contact, and (optionally) an Opportunity. Custom lead fields don't map automatically — you must configure <strong>lead field mapping</strong>, or the data is lost on convert.</p></div>

<h3>Record Types — one object, many business processes</h3>
<div class="box key"><div class="box-label">◆ Record types</div><p>A <strong>record type</strong> lets a single object support different business processes: different <strong>picklist values</strong>, different <strong>page layouts</strong> (assigned per record type per profile), and different <strong>business processes</strong> (sales processes, support processes, lead processes).</p></div>
<ul>
<li>Use record types when the <em>same</em> kind of record behaves differently for different segments — e.g. one Opportunity object with "New Business" and "Renewal" record types, each with its own stages and layout.</li>
<li>Record type assignment is controlled per <strong>profile</strong> (and permission set).</li>
<li>Record types do <strong>not</strong> control field-level security or record access — only picklist values, layouts, and process.</li>
</ul>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>Need different <em>picklist values</em> or <em>page layouts</em> for different groups on the same object → <strong>Record Types</strong>. Need to <em>restrict fields</em> → that's FLS, not record types. Need entirely different data → maybe a new custom object.</p></div>

<h3>Custom vs standard, and external objects</h3>
<ul>
<li><strong>Custom objects</strong> — when no standard object fits the entity. Get a <code>__c</code> suffix, standard features (fields, relationships, reports, layouts).</li>
<li><strong>External objects</strong> (<code>__x</code>) — map to data stored <em>outside</em> Salesforce via Salesforce Connect (OData/Apex adapters). Data is fetched live, not stored; ideal for large external datasets you shouldn't copy in.</li>
</ul>
`

  {
    id:'data_relationships', nav:'Relationship types',
    title:'Relationship types and their implications',
    lead:'The relationship you pick silently decides sharing, roll-ups, cascade delete, reporting, and required-ness. This is the most consequential modelling choice.',
    body:`
<h3>Master-Detail vs Lookup — the core comparison</h3>
<div class="tbl-scroll"><table>
<tr><th></th><th>Master-Detail</th><th>Lookup</th></tr>
<tr><td>Coupling</td><td><strong>Tight</strong> — child depends on parent</td><td><strong>Loose</strong> — independent</td></tr>
<tr><td>Parent required?</td><td><strong>Always required</strong></td><td>Optional (can be required)</td></tr>
<tr><td>Delete behaviour</td><td><strong>Cascade delete</strong> — delete parent → children deleted</td><td>By default parent can't be deleted if referenced; optional clear/prevent</td></tr>
<tr><td>Record ownership</td><td>Child has <strong>no owner</strong> — inherits parent's</td><td>Child has its own owner</td></tr>
<tr><td>Sharing / security</td><td>Child access <strong>controlled by parent</strong></td><td>Independent sharing</td></tr>
<tr><td>Roll-up summary on parent?</td><td><strong>Yes</strong></td><td><strong>No</strong> (except a few standard cases)</td></tr>
<tr><td>Reparenting</td><td>Not allowed by default (option to allow)</td><td>Freely reparented</td></tr>
<tr><td>Limit per object</td><td>Up to <strong>2</strong> master-detail fields</td><td>Up to 40 (counts toward relationship limit)</td></tr>
</table></div>
<div class="box key"><div class="box-label">◆ The deciding questions</div><p>Do you need a <strong>roll-up summary</strong> on the parent? → Master-detail (the only way to roll up). Should deleting the parent delete the children? → Master-detail. Should the child stand alone / be optionally linked / have its own sharing? → Lookup.</p></div>

<h3>Many-to-Many via a junction object</h3>
<p>Salesforce has no native many-to-many field. You create a <strong>junction object</strong> with <strong>two master-detail relationships</strong> — one to each parent.</p>
<ul>
<li>The <strong>first</strong> master-detail defined is the <strong>primary</strong>: it controls the junction record's <strong>ownership, sharing, and look-and-feel (colour, layout)</strong>, and its cascade behaviour.</li>
<li>The <strong>second</strong> is the secondary parent.</li>
<li>Example: a <em>Campaign Member</em>-style bridge, or <em>Job ↔ Candidate</em> via an "Application" junction.</li>
</ul>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>"A Position can have many Candidates and a Candidate many Positions" → <strong>junction object with two master-detail relationships</strong>. If a junction uses lookups instead of master-detail, you lose cascade delete and roll-up capability.</p></div>

<h3>Other relationship types</h3>
<ul>
<li><strong>Hierarchical</strong> — a special lookup available <em>only on the User object</em> (e.g. "Manager").</li>
<li><strong>External lookup</strong> — child (standard/custom/external) relates to an <strong>external object</strong> via a parent's External ID.</li>
<li><strong>Indirect lookup</strong> — an external object child relates to a standard/custom parent by matching an External ID field.</li>
<li><strong>Self-relationship</strong> — a lookup from an object to itself (e.g. Account → Parent Account).</li>
</ul>
<div class="box mnem"><div class="box-label">◆ Mnemonic — master-detail powers</div><p><strong>"ROCS"</strong>: <strong>R</strong>oll-ups, <strong>O</strong>wnership inherited, <strong>C</strong>ascade delete, <strong>S</strong>haring controlled by parent. If the scenario wants any of ROCS, it's master-detail.</p></div>
`

    id:'data_fieldtypes', nav:'Field data types & changes',
    title:'Selecting & changing field data types',
    lead:'Some type conversions are safe; others silently destroy existing data. You will be asked which.',
    body:`
<h3>Choosing the right field type</h3>
<div class="tbl-scroll"><table>
<tr><th>Need</th><th>Field type</th></tr>
<tr><td>Fixed set of choices, single</td><td>Picklist</td></tr>
<tr><td>Multiple choices from a set</td><td>Multi-select picklist (use sparingly — poor for reporting/filtering)</td></tr>
<tr><td>Calculated, read-only value</td><td>Formula</td></tr>
<tr><td>Auto-incrementing unique ID</td><td>Auto Number</td></tr>
<tr><td>Money</td><td>Currency</td></tr>
<tr><td>Yes/no</td><td>Checkbox</td></tr>
<tr><td>Link to another record</td><td>Lookup / Master-Detail</td></tr>
<tr><td>Unique external key for integration</td><td>Text/Number with <strong>External ID</strong> + Unique</td></tr>
</table></div>
<div class="box key"><div class="box-label">◆ External ID</div><p>Marking a field as <strong>External ID</strong> makes it indexed and usable as the match key for <strong>upserts</strong> and integration. Frequently the right answer when a scenario mentions matching Salesforce records to an external system's key.</p></div>

<h3>Changing a field's data type — data-loss rules</h3>
<div class="box trap"><div class="box-label">▲ The big one</div><p>Changing to certain types <strong>truncates or deletes</strong> existing data. Always test in a sandbox and export first.</p></div>
<div class="tbl-scroll"><table>
<tr><th>Conversion</th><th>Result</th></tr>
<tr><td>Text → Picklist</td><td>Generally safe, but existing values not in the picklist may need cleanup; <strong>can lose data</strong> if restricted</td></tr>
<tr><td>Picklist → Text</td><td>Safe (values become text)</td></tr>
<tr><td>Text ↔ Text Area</td><td>Safe</td></tr>
<tr><td>Text Area (Long) → Text/Text Area</td><td><strong>Truncates</strong> beyond the shorter limit → data loss</td></tr>
<tr><td>Number / Currency / Percent (interchange)</td><td>Usually safe, but watch decimal places / length</td></tr>
<tr><td>Auto Number → anything, or → Auto Number</td><td>Changing <em>to</em> Auto Number reassigns values; changing <em>from</em> Auto Number keeps the text</td></tr>
<tr><td>To/from <strong>most types generally</strong></td><td>Many conversions <strong>delete data in fields</strong> such as when changing to Checkbox, Currency, Number, Percent, Date, Date/Time — Salesforce warns you</td></tr>
</table></div>
<div class="box key"><div class="box-label">◆ Restrictions you can't change</div><ul style="margin-bottom:0"><li>Can't change a field used in an <strong>Apex, formula, or reference</strong> without resolving the dependency.</li><li>Can't convert a field to a type that <strong>breaks existing validation rules, roll-ups, or field updates</strong>.</li><li>Some conversions are simply <strong>not allowed</strong> (e.g. to/from certain formula/roll-up types).</li></ul></div>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>When a scenario asks "what happens to existing data if we change field X from Long Text Area to Text(255)?" → <strong>data beyond 255 characters is lost</strong>. The safe move is always: <em>export data, test in sandbox, then convert</em>.</p></div>
`

    lead:'Match the tool to the volume, the object, and whether you need to insert, update, or upsert.',
    body:`
<h3>Import tools</h3>
<div class="tbl-scroll"><table>
<tr><th>Tool</th><th>Volume</th><th>Notes</th></tr>
<tr><td><strong>Data Import Wizard</strong></td><td>Up to <strong>50,000</strong> records</td><td>In-browser; Accounts, Contacts, Leads, Campaign Members, custom objects. Can trigger workflows/flows optionally. No delete.</td></tr>

</table></div>
<div class="box key"><div class="box-label">◆ Wizard vs Loader shortcut</div><p><strong>≤50k, standard objects, admin doing it in-browser →</strong> Data Import Wizard. <strong>&gt;50k, any object, need upsert/delete/scheduling →</strong> Data Loader.</p></div>

<h3>Operations — insert / update / upsert</h3>
<ul>
<li><strong>Insert</strong> — create new records.</li>
<li><strong>Update</strong> — change existing records (matched by Salesforce Id).</li>
<li><strong>Upsert</strong> — insert or update in one pass, matched by <strong>External ID</strong> field. The go-to for syncing from an external system without duplicates.</li>
</ul>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>"Load records from another system, updating existing ones and creating new ones, avoiding duplicates" → <strong>upsert on an External ID field</strong>. Plain insert would duplicate; plain update would skip new records.</p></div>

<h3>Considerations before importing</h3>
<ul>

    body:`
<h3>What formula fields are</h3>
<ul>
<li><strong>Read-only</strong>, calculated every time the record is viewed/queried — <strong>never stored</strong>, always current.</li>
<li>Return types: Text, Number, Currency, Percent, Date, Date/Time, Checkbox (boolean), Time.</li>
<li>Can reference the record's own fields, and — via <strong>cross-object formulas</strong> — fields on <strong>parent</strong> records up the relationship chain.</li>
</ul>
<div class="box key"><div class="box-label">◆ Cross-object formulas</div><p>Formulas can traverse <strong>up to 10 relationships</strong> to pull a <em>parent's</em> field (e.g. show the Account's Industry on the Contact). They can go <strong>up</strong> (child → parent), never down to children — for children you need a roll-up summary.</p></div>

<h3>Common functions to recognise</h3>
<ul>
<li><strong>IF, CASE</strong> — branching logic.</li>
<li><strong>ISBLANK / ISNULL, ISCHANGED, ISNEW, PRIORVALUE</strong> — state checks (the last three only in validation rules / flows, not in formula fields).</li>
<li><strong>TEXT, VALUE, DATE, TODAY, NOW</strong> — conversions & dates.</li>
<li><strong>ISPICKVAL, INCLUDES</strong> — picklist / multi-select checks.</li>
<li><strong>HYPERLINK, IMAGE</strong> — rich display.</li>
</ul>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>A formula field <strong>cannot</strong> reference a <strong>child</strong> record or aggregate children — that's a roll-up summary. It also can't be edited or set by automation. And a formula field <strong>doesn't store history</strong>. Compiled formula size (~3,900 chars / 5,000 bytes) is a real limit for very complex formulas.</p></div>
`

<h3>What they do</h3>
<p>A <strong>roll-up summary</strong> sits on the <strong>parent</strong> and aggregates values from its <strong>child</strong> records: <strong>COUNT, SUM, MIN, MAX</strong>. The value is stored and recalculated automatically.</p>
<div class="box key"><div class="box-label">◆ The hard requirement</div><p>Roll-up summaries require a <strong>master-detail</strong> relationship (child → parent). You <strong>cannot</strong> create one over a plain lookup. A handful of standard exceptions exist (e.g. rolling up from Opportunities to Accounts), but for custom modelling: <strong>no master-detail, no roll-up</strong>.</p></div>

<h3>Capabilities & limits</h3>
<ul>
<li>Can filter which child records are included (criteria).</li>

<div class="box mnem"><div class="box-label">◆ Remember</div><p>Roll-up = <strong>up</strong> the master-detail, aggregating <strong>down-level children</strong>, using only <strong>COUNT/SUM/MIN/MAX</strong>.</p></div>
`

<h3>How they work</h3>
<ul>
<li>A validation rule is a <strong>formula that returns TRUE/FALSE</strong>. <strong>TRUE = error</strong> — the save is blocked and the message shown.</li>

<div class="box trap"><div class="box-label">▲ Exam trap</div><p>Validation rules also fire on records created/updated by <strong>imports, APIs, and automation</strong> — a badly written rule can break a data load or a Flow. To exempt an integration, gate the rule on <code>$User</code>/<code>$Profile</code>. Also: cross-object validation can reference <strong>parent</strong> fields (up the master-detail), not children.</p></div>

<h3>Anatomy of an approval process</h3>
<ul>

<h3>The current automation landscape</h3>
<div class="box key"><div class="box-label">◆ Flow-first world</div><p>Salesforce has <strong>retired the ability to create new Workflow Rules and Process Builder processes</strong>. <strong>Flow is the go-to declarative automation tool</strong> for anything new. Existing Workflow/Process Builder may still appear in scenarios (for updates), but new automation = Flow.</p></div>

<div class="tbl-scroll"><table>

<tr><td>Complex bulk logic / callouts / rollback / logic Flow can't express</td><td><strong>Apex</strong></td></tr>
</table></div>

<h3>Record-triggered Flow — before-save vs after-save</h3>
<div class="tbl-scroll"><table>
<tr><th></th><th>Before-save (fast field update)</th><th>After-save</th></tr>

    body:`
<h3>Order of Execution — the map</h3>
<p>On every save, Salesforce runs steps in a fixed order. A simplified, exam-relevant sequence:</p>
<ol>
<li>Loads the record and overwrites with new field values; <strong>system validation</strong> (required fields, field formats).</li>
<li><strong>Before-save record-triggered Flows</strong>.</li>
<li><strong>Before Apex triggers</strong>.</li>
<li>System + <strong>custom validation rules</strong> run again; <strong>duplicate rules</strong>.</li>
<li>Record saved (not yet committed).</li>
<li><strong>After Apex triggers</strong>.</li>
<li>Assignment rules, auto-response rules.</li>
<li><strong>Workflow rules</strong> (legacy) — and if a workflow field update fires, <strong>before/after triggers re-run once</strong>.</li>
<li><strong>After-save record-triggered Flows</strong> &amp; processes.</li>
<li>Escalation rules; <strong>roll-up summary</strong> recalculation on parent (which can trigger the parent's own automation).</li>
<li>Criteria-based sharing evaluation.</li>
<li>Commit to database; then <strong>post-commit</strong> logic (emails, async/@future, etc.).</li>
</ol>
<div class="box key"><div class="box-label">◆ Why this matters</div><p>Two automations updating the same fields can <strong>overwrite each other</strong> or fire in an order you didn't expect. Knowing the sequence explains "why did my validation rule fire before my flow set the value?" — because the flow ran <em>after</em>, or vice-versa.</p></div>

<h3>Recursion — the classic failure</h3>
<div class="box trap"><div class="box-label">▲ The recursion loop</div><p>Automation A updates Field 1 → that update triggers Automation B, which updates Field 2 → which re-triggers A… → infinite loop, hitting governor limits and erroring. Especially easy with <strong>field updates + roll-ups + record-triggered flows</strong> all touching related records.</p></div>
<h4>How to avoid it</h4>
<ul>
<li><strong>Gate with entry criteria / ISCHANGED</strong> so automation only runs when the relevant field actually changed.</li>
<li>Prefer <strong>one before-save flow</strong> per object for same-record updates rather than several overlapping automations.</li>
<li>Avoid multiple tools writing the <strong>same fields</strong>; consolidate logic.</li>
<li>Watch <strong>roll-up summaries re-triggering parent automation</strong>.</li>
<li>Test in a sandbox with realistic data volumes to surface <strong>governor-limit</strong> failures.</li>
</ul>
<div class="box mnem"><div class="box-label">◆ Rule of thumb</div><p><strong>One object, one before-save flow</strong> for field defaults; keep logic consolidated and entry criteria tight. Fewer tools touching a save = fewer surprises.</p></div>
`

<h3>The application lifecycle</h3>
<p>The healthy path keeps changes out of production until tested: <strong>develop → test → deploy</strong>, using sandboxes for build/QA/UAT/staging, then deploying to <strong>production</strong>.</p>

<h3>The four sandbox types</h3>
<div class="tbl-scroll"><table>
<tr><th>Sandbox</th><th>Data copied</th><th>Refresh interval</th><th>Best for</th></tr>

<div class="box key"><div class="box-label">◆ The two you must not confuse</div><p><strong>Partial Copy</strong> = a <em>sample</em> of data (sandbox template, capped per object), refresh every 5 days. <strong>Full</strong> = a <em>complete copy</em> of production, refresh every 29 days. Developer/Developer Pro carry <strong>no</strong> records — only configuration.</p></div>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>"Need to test against a realistic representative dataset but not the whole database" → <strong>Partial Copy</strong>. "Need production-scale data for performance testing / final staging" → <strong>Full</strong>. "Just need to build config, no data" → <strong>Developer</strong>. Refresh intervals are a frequent standalone question.</p></div>

<tr><td>Purpose</td><td>Distribute <strong>editable templates</strong> / open-source; move metadata</td><td>Distribute a <strong>product</strong> (ISV / AppExchange)</td></tr>

<tr><td>Upgradeable by publisher?</td><td><strong>No</strong></td><td><strong>Yes</strong> — versioned upgrades</td></tr>
<tr><td>Namespace</td><td>None</td><td><strong>Namespaced</strong> (isolated from org)</td></tr>
<tr><td>IP protected?</td><td>No (source visible)</td><td><strong>Yes</strong> (source hidden)</td></tr>
</table></div>
<div class="box key"><div class="box-label">◆ Choose by intent</div><p>Distributing a maintained, upgradeable, protected app to many customers → <strong>managed</strong>. Sharing an editable starting point / open-source template, or moving metadata between your own orgs → <strong>unmanaged</strong>.</p></div>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>Only <strong>managed</strong> packages support <strong>publisher upgrades</strong> and <strong>IP protection</strong>. Once an unmanaged package is installed, the publisher can't push updates — the subscriber owns and edits the components. AppExchange commercial apps are almost always <strong>managed</strong>.</p></div>
<p>Modern tooling adds <strong>unlocked packages</strong> and <strong>second-generation (2GP) packaging</strong> for source-driven development, but the managed/unmanaged distinction is the exam core.</p>
`
  },
  {
    id:'deploy_plan', nav:'Choosing a deployment plan',
    title:'Determining the appropriate deployment plan',
    lead:'Match the deployment mechanism to the org relationship, the change size, and whether deletions or automation are involved.',
    body:`
<h3>The mechanisms, matched to scenarios</h3>
<div class="tbl-scroll"><table>
<tr><th>Situation</th><th>Best mechanism</th></tr>
<tr><td>Admin moving config between a sandbox and its production org</td><td><strong>Change set</strong></td></tr>
<tr><td>Deploying to an <strong>unrelated</strong> org / distributing to customers</td><td><strong>Package</strong> (managed/unmanaged/unlocked)</td></tr>
<tr><td>Source-controlled, developer-driven, CI/CD deployment</td><td><strong>SFDX / Metadata API</strong> (VS Code, ANT)</td></tr>
<tr><td>Need to <strong>delete</strong> components in target</td><td><strong>Metadata API</strong> (destructiveChanges) — not change sets</td></tr>
<tr><td>Small, one-off declarative change</td><td>Rebuild by hand or change set</td></tr>
</table></div>
<div class="box key"><div class="box-label">◆ Key considerations for any plan</div><ul style="margin-bottom:0"><li><strong>Test in a sandbox</strong> and <strong>validate</strong> before deploying to production.</li><li><strong>Apex code coverage</strong> — deploying to production requires ≥75% coverage overall and all triggers with some coverage.</li><li>Watch <strong>dependencies</strong> and <strong>order</strong> (objects before the fields/rules that reference them).</li><li>Plan for <strong>data</strong> separately — deployment tools move metadata, not records.</li></ul></div>
<div class="box trap"><div class="box-label">▲ Exam trap</div><p>Deploying anything containing <strong>Apex</strong> to <strong>production</strong> triggers the <strong>75% code coverage</strong> gate — a favourite deployment question even on this declarative-focused exam. And remember change sets can't delete or reach unrelated orgs.</p></div>
`
  }
  ]
});

DATA.cheats.push({

<div class="cheat-grid">

<script>
/* ================= ENGINE ================= */
const LS_KEY='pab_progress_v1';
let progress={};
try{progress=JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){progress={}}
function saveProgress(){try{localStorage.setItem(LS_KEY,JSON.stringify(progress))}catch(e){}}

// Flatten all lessons for navigation order
let LESSONS=[];
DATA.domains.forEach(d=>d.lessons.forEach(l=>LESSONS.push({...l,domain:d.title,dnum:d.num,weight:d.weight})));
const TOTAL=LESSONS.length;

function buildNav(){
  const nav=document.getElementById('nav');
  let html='';
  html+=`<div class="nav-group"><a class="nav-link" data-view="overview" onclick="show('overview')">Exam Overview &amp; Strategy</a></div>`;
  DATA.domains.forEach(d=>{
    html+=`<div class="nav-group">`;
    html+=`<div class="nav-domain"><span>${d.num} · ${d.short}</span><span class="wt">${d.weight}%</span></div>`;
    d.lessons.forEach(l=>{
      html+=`<a class="nav-link" data-view="${l.id}" onclick="show('${l.id}')"><span class="check" data-check="${l.id}"></span>${l.nav}</a>`;
    });
    html+=`</div>`;
  });
  html+=`<div class="nav-section-title">Cheat Sheets</div>`;
  DATA.cheats.forEach(c=>{
    html+=`<a class="nav-link cheat" data-view="${c.id}" onclick="show('${c.id}')">${c.nav}</a>`;
  });
  html+=`<a class="nav-link cheat" data-view="master" onclick="show('master')" style="font-weight:600">Master Cheat Sheet</a>`;
  nav.innerHTML=html;
  refreshChecks();
}

function refreshChecks(){
  document.querySelectorAll('[data-check]').forEach(el=>{
    el.textContent=progress[el.dataset.check]?'✓ ':'';
    el.className='check '+(progress[el.dataset.check]?'done':'');
  });
  const done=LESSONS.filter(l=>progress[l.id]).length;
  document.getElementById('progText').textContent=`${done} / ${TOTAL}`;
  document.getElementById('progFill').style.width=(done/TOTAL*100)+'%';
}

function renderView(id){
  // overview
  if(id==='overview')return DATA.overview;
  if(id==='master')return DATA.master;
  const cheat=DATA.cheats.find(c=>c.id===id);
  if(cheat)return cheat.html;
  const idx=LESSONS.findIndex(l=>l.id===id);
  if(idx<0)return '<p>Not found.</p>';
  const l=LESSONS[idx];
  const prev=LESSONS[idx-1], next=LESSONS[idx+1];
  const done=progress[l.id];
  let html=`<div class="eyebrow"><span class="num">${l.dnum}</span> · ${l.domain} <span class="wt-badge">${l.weight}% domain</span></div>`;
  html+=`<h2 class="title">${l.title}</h2>`;
  if(l.lead)html+=`<p class="lead">${l.lead}</p>`;
  html+=`<div class="rule"></div>`;
  html+=l.body;
  html+=`<div class="lesson-foot">`;
  html+=`<button class="mark-btn ${done?'done':''}" onclick="toggleDone('${l.id}')">${done?'✓ Completed':'Mark complete'}</button>`;
  html+=`<div class="nav-jump">`;
  html+=`<button ${prev?`onclick="show('${prev.id}')"`:'disabled'}>← Prev</button>`;
  html+=`<button ${next?`onclick="show('${next.id}')"`:'disabled'}>Next →</button>`;
  html+=`</div></div>`;
  return html;
}

function show(id){
  const c=document.getElementById('content');
  c.innerHTML=renderView(id);
  document.querySelectorAll('.nav-link').forEach(el=>el.classList.toggle('active',el.dataset.view===id));
  window.scrollTo(0,0);
  document.querySelector('.main').scrollTo(0,0);
  location.hash=id;
  if(window.innerWidth<=960)document.getElementById('sidebar').classList.remove('open');
}

function toggleDone(id){
  progress[id]=!progress[id];
  saveProgress();refreshChecks();
  show(id);
}
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open')}
function printCheat(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('printing'));
  // build a temp printable node
  const tmp=document.createElement('div');
  tmp.className='view printing';tmp.id='__print';
  tmp.innerHTML=id==='master'?DATA.master:(DATA.cheats.find(c=>c.id===id)||{}).html;
  document.body.appendChild(tmp);
  window.print();
  setTimeout(()=>tmp.remove(),200);
}

buildNav();
const start=(location.hash||'#overview').slice(1);
show(document.querySelector(`[data-view="${start}"]`)?start:'overview');
</script>
