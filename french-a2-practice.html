<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French A2 — Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#F7F7F5;
    --carbon:#141415;
    --indigo:#0047FF;
    --flint:#8E8E8B;
    --hair:rgba(20,20,21,0.14);
    --hair-strong:rgba(20,20,21,0.28);
    --ok:#141415;
    --ease:cubic-bezier(0.16,1,0.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--canvas);color:var(--carbon)}
  body{
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    min-height:100vh;
    padding:0;
  }
  .wrap{max-width:680px;margin:0 auto;padding:32px 22px 96px}
  h1,h2,h3,.display{
    font-family:"Inter Tight","Inter",system-ui,sans-serif;
    letter-spacing:-0.04em;
    font-weight:600;
    line-height:1.05;
  }
  .eyebrow{
    font-family:"Inter Tight","Inter",sans-serif;
    font-size:11px;
    font-weight:500;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--flint);
    margin-bottom:14px;
    display:block;
  }
  .eyebrow .num{color:var(--carbon)}
  h1{font-size:34px;margin-bottom:14px}
  h2{font-size:26px;margin-bottom:12px}
  .lede{color:var(--flint);font-size:15px;max-width:52ch;margin-bottom:28px}
  .card{
    background:var(--canvas);
    border:0.5px solid var(--hair-strong);
    padding:26px 22px;
  }
  .rule{height:0.5px;background:var(--hair);border:0;margin:26px 0}
  /* buttons */
  button{font-family:inherit;cursor:pointer}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--carbon);color:var(--canvas);
    border:0.5px solid var(--carbon);
    padding:13px 22px;font-size:14px;font-weight:500;
    transition:background .5s var(--ease),transform .5s var(--ease);
    width:100%;
  }
  .btn:hover{background:#000}
  .btn:disabled{opacity:0.35;cursor:not-allowed}
  .btn.primary{background:var(--indigo);border-color:var(--indigo);color:#fff}
  .btn.primary:hover{background:#0038cc}
  .btn.ghost{background:transparent;color:var(--carbon)}
  .btn.ghost:hover{background:rgba(20,20,21,0.04)}
  .btn.sm{width:auto;padding:9px 15px;font-size:13px}
  /* option list */
  .opts{display:flex;flex-direction:column;gap:10px;margin:22px 0}
  .opt{
    text-align:left;background:transparent;color:var(--carbon);
    border:0.5px solid var(--hair-strong);
    padding:14px 16px;font-size:15px;font-weight:400;
    transition:border-color .4s var(--ease),background .4s var(--ease);
    display:flex;align-items:center;gap:12px;
  }
  .opt:hover:not(:disabled){border-color:var(--carbon)}
  .opt .key{
    font-family:"Inter Tight",sans-serif;font-size:12px;color:var(--flint);
    border:0.5px solid var(--hair-strong);min-width:22px;height:22px;
    display:inline-flex;align-items:center;justify-content:center;
  }
  .opt.correct{border-color:var(--carbon);background:rgba(20,20,21,0.05)}
  .opt.correct .key{background:var(--carbon);color:var(--canvas);border-color:var(--carbon)}
  .opt.wrong{border-color:var(--indigo)}
  .opt.wrong .key{border-color:var(--indigo);color:var(--indigo)}
  .opt:disabled{cursor:default}
  /* input */
  .field{
    width:100%;background:transparent;color:var(--carbon);
    border:0;border-bottom:0.5px solid var(--hair-strong);
    padding:12px 2px;font-size:20px;font-family:"Inter Tight",sans-serif;
    letter-spacing:-0.02em;
    outline:none;margin:18px 0 6px;
  }
  .field:focus{border-bottom-color:var(--indigo)}
  .field::placeholder{color:var(--flint);opacity:0.6}
  /* feedback */
  .feedback{margin-top:20px;padding-top:20px;border-top:0.5px solid var(--hair)}
  .verdict{font-family:"Inter Tight",sans-serif;font-size:15px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px}
  .verdict.right{color:var(--carbon)}
  .verdict.miss{color:var(--indigo)}
  .soln{font-size:15px;margin-bottom:8px}
  .soln b{font-weight:500}
  .note{font-size:13px;color:var(--flint);line-height:1.5}
  .accentflag{font-size:12.5px;color:var(--indigo);margin-top:6px}
  /* prompt */
  .prompt{font-family:"Inter Tight",sans-serif;font-size:22px;letter-spacing:-0.03em;line-height:1.3;margin:6px 0 4px}
  .prompt .gap{color:var(--indigo);border-bottom:1.5px solid var(--indigo);padding:0 14px}
  .translate-src{font-size:14px;color:var(--flint);margin-bottom:2px}
  /* meta row */
  .meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px}
  .meta .pos{font-family:"Inter Tight",sans-serif;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:var(--flint)}
  .meta .score{font-family:"Inter Tight",sans-serif;font-size:12px;color:var(--carbon)}
  /* progress */
  .track{height:2px;background:var(--hair);margin-bottom:26px;position:relative}
  .track .fill{height:2px;background:var(--indigo);transition:width .5s var(--ease)}
  /* listen */
  .listen{
    background:transparent;border:0.5px solid var(--hair-strong);color:var(--carbon);
    width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;
    transition:border-color .4s var(--ease);flex:0 0 auto;
  }
  .listen:hover{border-color:var(--carbon)}
  .listen svg{width:15px;height:15px}
  .promptrow{display:flex;align-items:center;gap:14px}
  /* module grid */
  .modules{display:flex;flex-direction:column;gap:0;margin-top:8px;border-top:0.5px solid var(--hair)}
  .mod{
    display:flex;align-items:center;gap:16px;text-align:left;width:100%;
    background:transparent;border:0;border-bottom:0.5px solid var(--hair);
    padding:18px 4px;transition:padding .4s var(--ease);
  }
  .mod:hover{padding-left:12px}
  .mod .idx{font-family:"Inter Tight",sans-serif;font-size:12px;color:var(--flint);min-width:26px}
  .mod .body{flex:1}
  .mod .t{font-family:"Inter Tight",sans-serif;font-size:16px;letter-spacing:-0.02em;font-weight:500}
  .mod .d{font-size:13px;color:var(--flint);margin-top:2px}
  .mod .arrow{color:var(--carbon);font-size:16px}
  .mod.rec .t::after{content:"Recommended";font-family:"Inter",sans-serif;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--indigo);border:0.5px solid var(--indigo);padding:2px 6px;margin-left:10px;vertical-align:middle;font-weight:500}
  .mod .done{font-size:11px;color:var(--flint);text-transform:uppercase;letter-spacing:0.08em}
  /* level readout */
  .band{border:0.5px solid var(--hair-strong);padding:28px 22px;margin:24px 0}
  .band .lvl{font-family:"Inter Tight",sans-serif;font-size:56px;letter-spacing:-0.05em;line-height:1;color:var(--indigo)}
  .band .lvlname{font-size:14px;color:var(--flint);margin-top:8px}
  .barwrap{margin:22px 0}
  .barlabels{display:flex;justify-content:space-between;font-size:11px;color:var(--flint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;font-family:"Inter Tight",sans-serif}
  .scale{display:flex;height:6px;gap:2px}
  .scale .seg{flex:1;background:var(--hair)}
  .scale .seg.on{background:var(--carbon)}
  .scale .seg.here{background:var(--indigo)}
  .fade{animation:fade .5s var(--ease)}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .footnote{font-size:12px;color:var(--flint);margin-top:34px;line-height:1.6}
  .kbd{font-family:"Inter Tight",sans-serif;font-size:11px;border:0.5px solid var(--hair-strong);padding:1px 5px;color:var(--flint)}
  .opt.sel{border-color:var(--carbon);background:rgba(20,20,21,0.04)}
  .opt.sel .key{background:var(--carbon);color:var(--canvas);border-color:var(--carbon)}
  .timer{font-family:"Inter Tight",sans-serif;font-size:13px;letter-spacing:0.04em;border:0.5px solid var(--hair-strong);padding:5px 11px;color:var(--carbon)}
  .timer.low{color:var(--indigo);border-color:var(--indigo)}
  .examtext{border:0.5px solid var(--hair-strong);padding:18px;font-size:15px;line-height:1.6;margin-bottom:22px;white-space:pre-line}
  .ta{width:100%;min-height:150px;background:transparent;border:0.5px solid var(--hair-strong);padding:14px;font-family:"Inter",sans-serif;font-size:15px;line-height:1.55;color:var(--carbon);outline:none;resize:vertical;margin-top:16px}
  .ta:focus{border-color:var(--indigo)}
  .wcount{font-size:12px;color:var(--flint);margin-top:8px;text-align:right}
  .rubric{display:flex;flex-direction:column;gap:0;margin:12px 0 4px;border-top:0.5px solid var(--hair)}
  .rubrow{display:flex;gap:12px;align-items:flex-start;padding:13px 2px;border:0;border-bottom:0.5px solid var(--hair);width:100%;cursor:pointer;font-size:14px;color:var(--carbon);background:transparent;text-align:left;line-height:1.45}
  .rubrow .box{width:19px;height:19px;border:0.5px solid var(--hair-strong);flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px}
  .rubrow.on .box{background:var(--carbon);color:var(--canvas);border-color:var(--carbon)}
  .breakdown{border-top:0.5px solid var(--hair);margin-top:18px}
  .brow{display:flex;justify-content:space-between;align-items:baseline;padding:13px 2px;border-bottom:0.5px solid var(--hair);font-size:14px}
  .brow .s{font-family:"Inter Tight",sans-serif;color:var(--flint)}
  .review{margin-top:8px}
  .revitem{border-bottom:0.5px solid var(--hair);padding:14px 0}
  .revitem .rq{font-size:14px;font-weight:500;margin-bottom:6px}
  .revitem .ra{font-size:13px;color:var(--flint);line-height:1.5}
  .revitem .ra .good{color:var(--carbon)}
  .revitem .ra .bad{color:var(--indigo);text-decoration:line-through}
  .band .lvl.fail{color:var(--indigo)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media(max-width:520px){
    h1{font-size:28px}.wrap{padding:24px 18px 80px}
    .band .lvl{font-size:46px}.prompt{font-size:19px}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ============================ DATA ============================ */

// Placement test — graded A1 -> A2+ to estimate a starting point.
const PLACEMENT = [
 {
  "band": 1,
  "q": "Je ___ étudiant.",
  "options": [
   "suis",
   "es",
   "est",
   "sommes"
  ],
  "answer": "suis",
  "tts": "Je suis étudiant."
 },
 {
  "band": 1,
  "q": "Tu ___ à Nantes ?",
  "options": [
   "habites",
   "habite",
   "habitez",
   "habitent"
  ],
  "answer": "habites",
  "tts": "Tu habites à Nantes ?"
 },
 {
  "band": 1,
  "q": "___ heure est-il ?",
  "options": [
   "Quelle",
   "Quel",
   "Quels",
   "Comment"
  ],
  "answer": "Quelle",
  "tts": "Quelle heure est-il ?"
 },
 {
  "band": 2,
  "q": "Elle ne mange ___ de viande.",
  "options": [
   "pas",
   "personne",
   "aucun",
   "rien"
  ],
  "answer": "pas",
  "tts": "Elle ne mange pas de viande."
 },
 {
  "band": 2,
  "q": "Hier, j'___ mangé une pizza.",
  "options": [
   "ai",
   "suis",
   "a",
   "as"
  ],
  "answer": "ai",
  "tts": "Hier, j'ai mangé une pizza."
 },
 {
  "band": 2,
  "q": "Nous allons ___ un film ce soir.",
  "options": [
   "regarder",
   "regardé",
   "regardons",
   "regardez"
  ],
  "answer": "regarder",
  "tts": "Nous allons regarder un film ce soir."
 },
 {
  "band": 3,
  "q": "Elle est ___ au cinéma. (aller)",
  "options": [
   "allée",
   "allé",
   "allés",
   "a allé"
  ],
  "answer": "allée",
  "tts": "Elle est allée au cinéma."
 },
 {
  "band": 3,
  "q": "Quand j'étais petit, je ___ au foot. (jouer)",
  "options": [
   "jouais",
   "ai joué",
   "joue",
   "jouerai"
  ],
  "answer": "jouais",
  "tts": "Quand j'étais petit, je jouais au foot."
 },
 {
  "band": 3,
  "q": "Je voudrais ___ eau, s'il vous plaît.",
  "options": [
   "de l'",
   "du",
   "de la",
   "des"
  ],
  "answer": "de l'",
  "tts": "Je voudrais de l'eau, s'il vous plaît."
 },
 {
  "band": 4,
  "q": "Tu vois Marie ? Oui, je ___ vois.",
  "options": [
   "la",
   "le",
   "lui",
   "y"
  ],
  "answer": "la",
  "tts": "Tu vois Marie ? Oui, je la vois."
 },
 {
  "band": 4,
  "q": "Ce livre est ___ intéressant ___ l'autre.",
  "options": [
   "plus … que",
   "aussi … comme",
   "moins … de",
   "très … que"
  ],
  "answer": "plus … que",
  "tts": "Ce livre est plus intéressant que l'autre."
 },
 {
  "band": 5,
  "q": "Il faut que je ___ maintenant. (partir)",
  "options": [
   "parte",
   "pars",
   "partir",
   "partirai"
  ],
  "answer": "parte",
  "tts": "Il faut que je parte maintenant."
 }
];

const MODULES = [
 {
  "id": "pc",
  "title": "Le passé composé.",
  "desc": "Talking about finished past actions — avoir vs être.",
  "ex": [
   {
    "type": "mcq",
    "q": "J'___ fini mes devoirs.",
    "options": [
     "ai",
     "suis",
     "a",
     "as"
    ],
    "answer": "ai",
    "tts": "J'ai fini mes devoirs.",
    "note": "'Finir' takes avoir, like most verbs."
   },
   {
    "type": "fill",
    "q": "Elle a ___ le bus. (prendre)",
    "answer": [
     "pris"
    ],
    "tts": "Elle a pris le bus.",
    "note": "Irregular participle: prendre → pris."
   },
   {
    "type": "mcq",
    "q": "Nous ___ arrivés à midi.",
    "options": [
     "sommes",
     "avons",
     "êtes",
     "ont"
    ],
    "answer": "sommes",
    "tts": "Nous sommes arrivés à midi.",
    "note": "Arriver uses être; the participle agrees (arrivé-s)."
   },
   {
    "type": "fill",
    "q": "Ils sont ___ hier soir. (partir)",
    "answer": [
     "partis"
    ],
    "tts": "Ils sont partis hier soir.",
    "note": "Être verb, masculine plural → partis."
   },
   {
    "type": "translate",
    "src": "I saw that film.",
    "answer": [
     "j'ai vu ce film"
    ],
    "tts": "J'ai vu ce film.",
    "note": "voir → vu."
   },
   {
    "type": "fill",
    "q": "Tu as ___ à ta mère ? (écrire)",
    "answer": [
     "écrit",
     "ecrit"
    ],
    "tts": "Tu as écrit à ta mère ?",
    "note": "écrire → écrit."
   },
   {
    "type": "mcq",
    "q": "Vous ___ venus en train ?",
    "options": [
     "êtes",
     "avez",
     "ont",
     "sommes"
    ],
    "answer": "êtes",
    "tts": "Vous êtes venus en train ?",
    "note": "venir uses être: vous êtes venus."
   },
   {
    "type": "fill",
    "q": "Elle s'est ___ à sept heures. (se réveiller)",
    "answer": [
     "réveillée",
     "reveillee"
    ],
    "tts": "Elle s'est réveillée à sept heures.",
    "note": "Reflexive verbs use être; agrees → réveillée."
   },
   {
    "type": "mcq",
    "q": "J'ai ___ mes clés.",
    "options": [
     "perdu",
     "perdue",
     "perdus",
     "perds"
    ],
    "answer": "perdu",
    "tts": "J'ai perdu mes clés.",
    "note": "With avoir, no agreement when the object comes after → perdu."
   },
   {
    "type": "translate",
    "src": "We went to Paris.",
    "answer": [
     "nous sommes allés à paris",
     "on est allés à paris",
     "nous sommes alles a paris"
    ],
    "tts": "Nous sommes allés à Paris.",
    "note": "aller uses être: nous sommes allés."
   },
   {
    "type": "fill",
    "q": "Hier, il a ___ beau. (faire)",
    "answer": [
     "fait"
    ],
    "tts": "Hier, il a fait beau.",
    "note": "faire → fait; weather uses 'il fait'."
   }
  ]
 },
 {
  "id": "imp",
  "title": "Imparfait ou passé composé.",
  "desc": "Background and habit vs a single completed event.",
  "ex": [
   {
    "type": "mcq",
    "q": "Il ___ quand je suis sorti. (pleuvoir)",
    "options": [
     "pleuvait",
     "a plu",
     "pleut",
     "pleuvra"
    ],
    "answer": "pleuvait",
    "tts": "Il pleuvait quand je suis sorti.",
    "note": "Ongoing scene → imparfait."
   },
   {
    "type": "mcq",
    "q": "Soudain, le téléphone ___.",
    "options": [
     "a sonné",
     "sonnait",
     "sonne",
     "sonnera"
    ],
    "answer": "a sonné",
    "tts": "Soudain, le téléphone a sonné.",
    "note": "'Soudain' = a single event → passé composé."
   },
   {
    "type": "fill",
    "q": "Quand j'étais jeune, j'___ à Paris. (habiter)",
    "answer": [
     "habitais"
    ],
    "tts": "Quand j'étais jeune, j'habitais à Paris.",
    "note": "A lasting past state → imparfait."
   },
   {
    "type": "mcq",
    "q": "Chaque matin, elle ___ un café.",
    "options": [
     "buvait",
     "a bu",
     "boit",
     "boira"
    ],
    "answer": "buvait",
    "tts": "Chaque matin, elle buvait un café.",
    "note": "'Chaque matin' = a habit → imparfait."
   },
   {
    "type": "translate",
    "src": "I was reading when she arrived.",
    "answer": [
     "je lisais quand elle est arrivée",
     "je lisais quand elle est arrivee"
    ],
    "tts": "Je lisais quand elle est arrivée.",
    "note": "Background (lisais) + event (est arrivée)."
   },
   {
    "type": "mcq",
    "q": "Nous ___ la télé quand tu as téléphoné.",
    "options": [
     "regardions",
     "avons regardé",
     "regardons",
     "regarderons"
    ],
    "answer": "regardions",
    "tts": "Nous regardions la télé quand tu as téléphoné.",
    "note": "Interrupted action → imparfait."
   },
   {
    "type": "mcq",
    "q": "L'année dernière, je ___ en Espagne.",
    "options": [
     "suis allé",
     "allais",
     "vais",
     "irai"
    ],
    "answer": "suis allé",
    "tts": "L'année dernière, je suis allé en Espagne.",
    "note": "A completed, dated trip → passé composé."
   },
   {
    "type": "fill",
    "q": "Avant, il ___ très timide. (être)",
    "answer": [
     "était",
     "etait"
    ],
    "tts": "Avant, il était très timide.",
    "note": "A past description → imparfait: était."
   },
   {
    "type": "mcq",
    "q": "Elle ___ ses études en 2020.",
    "options": [
     "a fini",
     "finissait",
     "finit",
     "finira"
    ],
    "answer": "a fini",
    "tts": "Elle a fini ses études en 2020.",
    "note": "A precise completed moment → passé composé."
   }
  ]
 },
 {
  "id": "fut",
  "title": "Le futur.",
  "desc": "Futur proche (aller + infinitive) and futur simple.",
  "ex": [
   {
    "type": "mcq",
    "q": "Demain, je ___ voir mes amis.",
    "options": [
     "vais",
     "vas",
     "va",
     "vont"
    ],
    "answer": "vais",
    "tts": "Demain, je vais voir mes amis.",
    "note": "Futur proche: je vais + infinitive."
   },
   {
    "type": "fill",
    "q": "L'année prochaine, nous ___ en Italie. (voyager)",
    "answer": [
     "voyagerons"
    ],
    "tts": "L'année prochaine, nous voyagerons en Italie.",
    "note": "Futur simple: infinitive + -ons."
   },
   {
    "type": "mcq",
    "q": "Il ___ content demain. (être)",
    "options": [
     "sera",
     "est",
     "était",
     "serait"
    ],
    "answer": "sera",
    "tts": "Il sera content demain.",
    "note": "être is irregular: il sera."
   },

const state = { view:"home", pi:0, pscore:0, placed:null, recId:null, done:{}, mod:null, ei:0, escore:0, answered:false, exam:null };

/* ============================ HELPERS ============================ */
function norm(s){return (s||"").toLowerCase().trim().replace(/\s+/g," ").replace(/[.?!,;:]+$/,"").replace(/[''']/g,"'");}
function stripAccents(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function speak(text){
  try{
    if(!("speechSynthesis" in window))return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="fr-FR"; u.rate=0.92;
    const v=window.speechSynthesis.getVoices().find(x=>/fr(-|_)?FR/i.test(x.lang))||window.speechSynthesis.getVoices().find(x=>/^fr/i.test(x.lang));
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
if("speechSynthesis" in window){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();}
let currentAudio=null;
// Play a pre-rendered French clip if the item has one; fall back to the browser voice.
function playClip(item){
  try{if(currentAudio){currentAudio.pause();currentAudio=null;}}catch(e){}
  try{if("speechSynthesis" in window)window.speechSynthesis.cancel();}catch(e){}
  if(item&&item.audio){
    const a=new Audio(item.audio);currentAudio=a;
    let fell=false;const fb=()=>{if(!fell){fell=true;speak(item.tts);}};
    a.addEventListener("error",fb);
    a.play().catch(fb);
    return;
  }
  speak(item&&item.tts?item.tts:"");
}
const SPKR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>';
function gapify(q){return q.replace(/___/g,'<span class="gap">&nbsp;&nbsp;&nbsp;</span>');}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sampleN(a,n){return shuffle(a.slice()).slice(0,n);}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

function startPlace(){state.view="place";state.pi=0;state.pscore=0;state.answered=false;render();}
function skipToDash(){stopTimer();state.view="dash";render();}

function place(){
  const item=PLACEMENT[state.pi];
  const pct=Math.round((state.pi)/PLACEMENT.length*100);
  app.innerHTML=`
  <div class="fade">
    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    <div class="meta">
      <span class="pos">Placement · ${state.pi+1} of ${PLACEMENT.length}</span>
      <span class="score">${state.pscore} correct</span>
    </div>
    <div class="card">
      <div class="promptrow">
        <div class="prompt">${gapify(esc(item.q))}</div>
        <button class="listen" id="listenBtn" title="Listen">${SPKR}</button>
      </div>
      <div class="opts" id="opts"></div>
      <div id="fb"></div>
    </div>
  </div>`;
  document.getElementById("listenBtn").onclick=()=>speak(item.tts);
  const opts=document.getElementById("opts");
  const keys=["A","B","C","D"];
  item.options.forEach((o,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML=`<span class="key">${keys[i]}</span><span>${esc(o)}</span>`;
    b.onclick=()=>answerPlace(i);
    opts.appendChild(b);
  });
  keyMode="place";currentOptions=item.options;
}

function answerPlace(i){
  if(state.answered)return;
  state.answered=true;
  const item=PLACEMENT[state.pi];
  const chosen=item.options[i];
  const right=chosen===item.answer;
  if(right)state.pscore++;
  document.querySelectorAll("#opts .opt").forEach((el,idx)=>{
    el.disabled=true;
    if(item.options[idx]===item.answer)el.classList.add("correct");
    else if(idx===i)el.classList.add("wrong");
  });
  const last=state.pi===PLACEMENT.length-1;
  document.getElementById("fb").innerHTML=`
    <div class="feedback">
      <div class="verdict ${right?'right':'miss'}">${right?'Correct.':'Not quite.'}</div>
      <div class="soln">Answer: <b>${esc(item.answer)}</b></div>
      <button class="btn primary" onclick="nextPlace()">${last?'See my level':'Next'}</button>
    </div>`;
  speak(item.tts);
  enterAction=nextPlace;
}
function nextPlace(){
  enterAction=null;
  if(state.pi===PLACEMENT.length-1){finishPlace();return;}
  state.pi++;state.answered=false;render();
}
function finishPlace(){
  const s=state.pscore, r=s/PLACEMENT.length;
  let lvl,name,rec,seg;
  if(r<0.35){lvl="A1";name="Foundations still settling — we'll build up to A2.";rec="pc";seg=0;}
  else if(r<0.55){lvl="A2";name="Lower A2. Best entry point: the passé composé.";rec="pc";seg=2;}
  else if(r<0.75){lvl="A2";name="Solid A2. Time to sharpen tenses and quantities.";rec="imp";seg=3;}
  else if(r<0.9){lvl="A2+";name="Upper A2, brushing B1. Push comparisons and nuance.";rec="comp";seg=4;}
  else {lvl="B1";name="Beyond A2 already — treat these as a warm-up.";rec="comp";seg=5;}
  state.placed={lvl,name,seg};state.recId=rec;state.view="result";render();
}

      <div id="fb"></div>
    </div>
    <button class="btn ghost" style="margin-top:22px" onclick="skipToDash()">Leave module</button>
  </div>`;
  document.getElementById("listenBtn").onclick=()=>playClip(item);
  const body=document.getElementById("body");
  let html="";
  if(audioFirst){
    html+=`<button class="btn ghost" id="playBig" style="margin-bottom:18px;width:auto"><span style="display:inline-flex;align-items:center;margin-right:6px">${SPKR}</span>Play audio</button>`;
  }
  if(isChoice){
    html+=`<div class="opts" id="opts"></div>`;
    body.innerHTML=html;
    const wrapo=document.getElementById("opts");
    const keys=["A","B","C","D"];
    item.options.forEach((o,i)=>{
      const b=document.createElement("button");b.className="opt";
      b.innerHTML=`<span class="key">${keys[i]}</span><span>${esc(o)}</span>`;
      b.onclick=()=>answerMcq(i);wrapo.appendChild(b);
    });
    keyMode="mod";currentOptions=item.options;
  }else{
    const ph=item.type==="dictation"?"Type what you hear…":"Type in French…";
    html+=`<input class="field" id="fld" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="${ph}">
      <button class="btn primary" style="margin-top:16px" onclick="answerText()">Check answer</button>`;
    body.innerHTML=html;
    const fld=document.getElementById("fld");fld.focus();
    fld.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();if(!state.answered)answerText();else nextEx();}});
    keyMode=null;
  }
  if(audioFirst){
    document.getElementById("playBig").onclick=()=>playClip(item);
    setTimeout(()=>playClip(item),350);
  }
}

function answerMcq(i){
  if(state.answered)return;state.answered=true;
  const item=state.mod.ex[state.ei];
  const right=item.options[i]===item.answer;
  if(right)state.escore++;
  document.querySelectorAll("#opts .opt").forEach((el,idx)=>{
    el.disabled=true;
    if(item.options[idx]===item.answer)el.classList.add("correct");
    else if(idx===i)el.classList.add("wrong");
  });
  showFb(right,item);
}

function answerText(){
  if(state.answered)return;
  const item=state.mod.ex[state.ei];
  const val=document.getElementById("fld").value;
  if(!norm(val))return;
  state.answered=true;
  const accepted=item.answer.map(norm);
  const nv=norm(val);
  const exact=accepted.includes(nv);
  const accentless=accepted.map(stripAccents).includes(stripAccents(nv));
  const right=exact||accentless;
  if(right)state.escore++;
  const fld=document.getElementById("fld");fld.disabled=true;
  fld.style.borderBottomColor=right?"var(--carbon)":"var(--indigo)";
  const accentNote=(!exact&&accentless)?"Right words — just watch the accents.":"";
  showFb(right,item,accentNote);
}

function showFb(right,item,accentNote){
  const last=state.ei===state.mod.ex.length-1;
  const primary=item.answer? (Array.isArray(item.answer)?item.answer[0]:item.answer):"";
  document.getElementById("fb").innerHTML=`
    <div class="feedback">
      <div class="verdict ${right?'right':'miss'}">${right?'Correct.':'Not quite.'}</div>
      <div class="soln">Answer: <b>${esc(primary)}</b></div>
      ${accentNote?`<div class="accentflag">${accentNote}</div>`:''}
      ${item.type==="listen"?`<div class="note" style="margin-top:10px;color:var(--carbon)"><b style="font-weight:500">Transcript.</b> ${esc(item.tts)}</div>`:''}
      <div class="note" style="margin-top:8px">${esc(item.note||"")}</div>
      <button class="btn primary" style="margin-top:16px" onclick="nextEx()">${last?'Finish module':'Next'}</button>
    </div>`;
  playClip(item);
  enterAction=nextEx;
}

function nextEx(){
  enterAction=null;
  if(state.ei===state.mod.ex.length-1){
    state.done[state.mod.id]=state.escore;state.view="modsummary";render();return;
  }
  state.ei++;state.answered=false;render();
}

function modSummary(){
  const m=state.mod;const s=state.escore;const t=m.ex.length;
  const pctv=Math.round(s/t*100);
  let line;
  if(pctv===100)line="Full marks. This one's locked in.";
  else if(pctv>=70)line="Strong — a quick review of the misses and you're there.";
  else if(pctv>=40)line="Getting there. Worth another pass while it's fresh.";
  else line="Tricky module. Run it again — repetition is how A2 sticks.";
  app.innerHTML=`
  <div class="fade">
    <span class="eyebrow"><span class="num">04</span> &nbsp;—&nbsp; ${esc(m.title)}</span>
    <h1>${s} out of ${t}.</h1>
    <div class="band">
      <div class="lvl">${pctv}%</div>
      <div class="lvlname">${line}</div>
    </div>
    <button class="btn primary" onclick="retryMod()">Practise this module again</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="skipToDash()">Back to modules</button>
  </div>`;
}
function retryMod(){openMod(state.mod.id);}

/* ============================ MOCK EXAM ============================ */
function stopTimer(){if(state.exam&&state.exam.timerId){clearInterval(state.exam.timerId);state.exam.timerId=null;}}
function fmtTime(s){const m=Math.floor(s/60),ss=s%60;return m+":"+(ss<10?"0":"")+ss;}

function openExamIntro(){stopTimer();state.view="examintro";render();}

function examintro(){
  app.innerHTML=`
  <div class="fade">
    <span class="eyebrow">Assessment &nbsp;—&nbsp; DELF A2 format</span>
    <h1>Sit a mock A2 exam.</h1>
    <p class="lede">Three timed sections modelled on the DELF A2 used for residence and nationality: listening, reading, and one short piece of writing. ${EXAM.durationMin} minutes, no feedback until the end. Questions are drawn from a larger bank, so no two sittings are the same.</p>
    <div class="card">
      <div class="breakdown" style="border-top:0">
        <div class="brow"><span>Compréhension de l'oral</span><span class="s">${EXAM.sitListening} questions · /25</span></div>
        <div class="brow"><span>Compréhension des écrits</span><span class="s">${EXAM.readingTexts[0].questions.length} questions · /25</span></div>
        <div class="brow"><span>Production écrite</span><span class="s">1 task · /25</span></div>
      </div>
      <p class="note" style="margin:16px 0 20px">Pass mark is 50%. The real exam also has a spoken section with an examiner, which a self-study app can't stand in for — so treat your mark here as three-quarters of the full picture.</p>
      <button class="btn primary" onclick="beginExam()">Begin the exam</button>
      <div style="height:10px"></div>
      <button class="btn ghost" onclick="skipToDash()">Back to modules</button>
    </div>
  </div>`;
}

function beginExam(){
  EXAM.listening=sampleN(EXAM.listeningPool,Math.min(EXAM.sitListening,EXAM.listeningPool.length));
  EXAM.reading=pick(EXAM.readingTexts);
  EXAM.writing=pick(EXAM.writingPrompts);
  const seq=[];
  EXAM.listening.forEach((it,i)=>seq.push({sec:"listening",n:i,data:it}));
  EXAM.reading.questions.forEach((q,i)=>seq.push({sec:"reading",n:i,data:q}));
  seq.push({sec:"writing",n:0,data:EXAM.writing});
  state.exam={seq,idx:0,answers:{},writingText:"",rubric:[false,false,false,false],remaining:EXAM.durationMin*60,timerId:null};
  state.exam.timerId=setInterval(tick,1000);
  state.view="exam";render();
}

function tick(){
  if(!state.exam)return;
  state.exam.remaining--;
  const el=document.getElementById("timer");
  if(el){el.textContent=fmtTime(Math.max(0,state.exam.remaining));if(state.exam.remaining<=60)el.classList.add("low");}
  if(state.exam.remaining<=0)finishExam();
}

function exam(){
  const ex=state.exam;const step=ex.seq[ex.idx];const total=ex.seq.length;
  const pct=Math.round(ex.idx/total*100);
  const secName={listening:"Compréhension de l'oral",reading:"Compréhension des écrits",writing:"Production écrite"}[step.sec];
  const key=step.sec+"-"+step.n;
  let pos,bodyHTML="";
  if(step.sec==="listening"){
    pos=(step.n+1)+" / "+EXAM.listening.length;
    bodyHTML=`<div class="translate-src">Listen, then choose</div>
      <div class="prompt">${esc(step.data.q)}</div>
      <button class="btn ghost" id="playBig" style="margin:16px 0;width:auto"><span style="display:inline-flex;align-items:center;margin-right:6px">${SPKR}</span>Play audio</button>
      <div class="opts" id="opts"></div>`;
  }else if(step.sec==="reading"){
    pos=(step.n+1)+" / "+EXAM.reading.questions.length;
    bodyHTML=`<div class="examtext">${esc(EXAM.reading.text)}</div>
      <div class="prompt">${esc(step.data.q)}</div>
      <div class="opts" id="opts"></div>`;
  }else{
    pos="task";
    bodyHTML=`<div class="prompt" style="font-size:17px;line-height:1.4">${esc(step.data.prompt)}</div>
      <textarea class="ta" id="ta" placeholder="Écrivez votre message ici…">${esc(ex.writingText)}</textarea>
      <div class="wcount" id="wcount">0 words</div>`;
  }
  const isLast=ex.idx===total-1;
  app.innerHTML=`
  <div class="fade">
    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    <div class="meta">
      <span class="pos">${secName} · ${pos}</span>
      <span class="timer" id="timer">${fmtTime(Math.max(0,ex.remaining))}</span>
    </div>
    <div class="card">${bodyHTML}</div>
    <div style="display:flex;gap:10px;margin-top:20px">
      ${ex.idx>0?`<button class="btn ghost" style="flex:1" onclick="examBack()">Back</button>`:``}
      <button class="btn primary" style="flex:2" onclick="examNext()">${isLast?"Finish exam":"Next"}</button>
    </div>
    <button class="btn ghost" style="margin-top:12px" onclick="quitExam()">Quit exam</button>
  </div>`;
  if(step.sec==="listening"||step.sec==="reading"){
    const opts=document.getElementById("opts");const keys=["A","B","C","D"];const sel=ex.answers[key];
    step.data.options.forEach((o,i)=>{
      const b=document.createElement("button");b.className="opt"+(sel===o?" sel":"");
      b.innerHTML=`<span class="key">${keys[i]}</span><span>${esc(o)}</span>`;
      b.onclick=()=>examSelect(i);opts.appendChild(b);
    });
    keyMode="exam";currentOptions=step.data.options;enterAction=null;
  }else{
    keyMode=null;enterAction=null;
    const ta=document.getElementById("ta");
    const upd=()=>{const t=ta.value.trim();const w=t?t.split(/\s+/).length:0;const short=w<EXAM.writing.minWords;document.getElementById("wcount").textContent=w+" words"+(short?" · aim for "+EXAM.writing.minWords+"+":" ✓");ex.writingText=ta.value;};
    ta.addEventListener("input",upd);upd();ta.focus();
  }
  if(step.sec==="listening"){
    document.getElementById("playBig").onclick=()=>playClip(step.data);
    setTimeout(()=>playClip(step.data),350);
  }
}

function examSelect(i){
  const ex=state.exam;const step=ex.seq[ex.idx];const key=step.sec+"-"+step.n;
  ex.answers[key]=step.data.options[i];
  document.querySelectorAll("#opts .opt").forEach((el,idx)=>el.classList.toggle("sel",idx===i));
}
function saveWriting(){const ta=document.getElementById("ta");if(ta)state.exam.writingText=ta.value;}
function examNext(){const ex=state.exam;if(ex.seq[ex.idx].sec==="writing")saveWriting();if(ex.idx===ex.seq.length-1){finishExam();return;}ex.idx++;render();}
function examBack(){const ex=state.exam;if(ex.seq[ex.idx].sec==="writing")saveWriting();if(ex.idx>0)ex.idx--;render();}
function quitExam(){stopTimer();state.view="dash";render();}
function finishExam(){stopTimer();state.view="examresult";render();}
function toggleRubric(i){state.exam.rubric[i]=!state.exam.rubric[i];render();}

function examresult(){
  const ex=state.exam;
  let lC=0;EXAM.listening.forEach((it,i)=>{if(ex.answers["listening-"+i]===it.answer)lC++;});
  let rC=0;EXAM.reading.questions.forEach((q,i)=>{if(ex.answers["reading-"+i]===q.answer)rC++;});
  const lScore=Math.round(lC/EXAM.listening.length*25);
  const rScore=Math.round(rC/EXAM.reading.questions.length*25);
  const rubDone=ex.rubric.filter(Boolean).length;
  const wScore=Math.round(rubDone/ex.rubric.length*25);
  const total=lScore+rScore+wScore;const pct=Math.round(total/75*100);
  const pass=pct>=50;

  const lRev=EXAM.listening.map((it,i)=>{
    const your=ex.answers["listening-"+i];const ok=your===it.answer;
    return `<div class="revitem"><div class="rq">${i+1}. ${esc(it.q)}</div>
      <div class="ra">Your answer: <span class="${ok?'good':'bad'}">${esc(your||"—")}</span>${ok?'':` · Correct: <span class="good">${esc(it.answer)}</span>`}<br><span style="color:var(--flint)">Transcript: ${esc(it.tts)}</span></div></div>`;
  }).join("");
  const rRev=EXAM.reading.questions.map((q,i)=>{
    const your=ex.answers["reading-"+i];const ok=your===q.answer;
    return `<div class="revitem"><div class="rq">${i+1}. ${esc(q.q)}</div>
      <div class="ra">Your answer: <span class="${ok?'good':'bad'}">${esc(your||"—")}</span>${ok?'':` · Correct: <span class="good">${esc(q.answer)}</span>`}</div></div>`;
  }).join("");
  const rubRows=EXAM.writing.rubric.map((r,i)=>`<button class="rubrow ${ex.rubric[i]?'on':''}" onclick="toggleRubric(${i})"><span class="box">${ex.rubric[i]?'✓':''}</span><span>${esc(r)}</span></button>`).join("");

  app.innerHTML=`
  <div class="fade">
    <span class="eyebrow">Assessment &nbsp;—&nbsp; Result</span>
    <h1>${pass?'Pass.':'Not yet.'}</h1>
    <div class="band">
      <div class="lvl ${pass?'':'fail'}">${pct}%</div>
      <div class="lvlname">${pass?'Above the 50% pass mark on the written sections.':'Below the 50% mark — worth another run after some practice.'}</div>
      <div class="breakdown">
        <div class="brow"><span>Compréhension de l'oral</span><span class="s">${lScore} / 25 &nbsp;(${lC}/${EXAM.listening.length})</span></div>
        <div class="brow"><span>Compréhension des écrits</span><span class="s">${rScore} / 25 &nbsp;(${rC}/${EXAM.reading.questions.length})</span></div>
        <div class="brow"><span>Production écrite</span><span class="s">${wScore} / 25 &nbsp;(self-assessed)</span></div>
      </div>
      <div class="note" style="margin-top:12px">Total ${total} / 75. This estimates the written three-quarters of a DELF A2; the oral is assessed live in the real exam.</div>
    </div>

    <span class="eyebrow"><span class="num">A</span> &nbsp;—&nbsp; Your writing</span>
    <div class="examtext">${ex.writingText?esc(ex.writingText):'<span style="color:var(--flint)">No text written.</span>'}</div>
    <p class="note" style="margin-bottom:6px">Model answer for comparison:</p>
    <div class="examtext" style="border-style:dashed">${esc(EXAM.writing.model)}</div>
    <p class="note" style="margin-bottom:0">Score your own writing honestly — tick what your message actually did:</p>
    <div class="rubric">${rubRows}</div>

    <span class="eyebrow" style="margin-top:26px"><span class="num">B</span> &nbsp;—&nbsp; Listening review</span>
    <div class="review">${lRev}</div>
    <span class="eyebrow" style="margin-top:26px"><span class="num">C</span> &nbsp;—&nbsp; Reading review</span>
    <div class="review">${rRev}</div>

    <button class="btn primary" style="margin-top:28px" onclick="openExamIntro()">Retake the exam</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="skipToDash()">Back to modules</button>
  </div>`;
}

/* ============================ KEYBOARD ============================ */
let keyMode=null,currentOptions=[],enterAction=null;
document.addEventListener("keydown",e=>{
  if(keyMode==="exam"){
    const map={a:0,b:1,c:2,d:3};const k=e.key.toLowerCase();
    if(k in map && map[k]<currentOptions.length){e.preventDefault();examSelect(map[k]);return;}
    if(e.key==="Enter"){e.preventDefault();examNext();return;}
    return;
  }
  if(enterAction && e.key==="Enter"){e.preventDefault();enterAction();return;}
  if(keyMode && !state.answered){
    const map={a:0,b:1,c:2,d:3};const k=e.key.toLowerCase();
    if(k in map && map[k]<currentOptions.length){
      if(keyMode==="place")answerPlace(map[k]);
      else if(keyMode==="mod")answerMcq(map[k]);
    }
  }
});

/* ============================ INIT ============================ */
render();
</script>
</body>
</html>
